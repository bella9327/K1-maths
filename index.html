<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可愛動物計數遊戲</title>
    <style>
        body {
            background-color: #fdf8e1;
            font-family: 'Comic Sans MS', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #5c4a3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { color: #ff8b94; margin-bottom: 10px; }

        .score-board {
            font-size: 28px;
            background-color: #ffecd2;
            padding: 10px 40px;
            border-radius: 25px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .game-area {
            background-color: #ffffff;
            width: 90%;
            max-width: 450px;
            height: 250px;
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* 允許動物換行或自動排列 */
            margin-bottom: 25px;
            border: 6px solid #bce6eb;
            padding: 10px;
            box-sizing: border-box;
        }

        .animal-icon { 
            margin: 5px 10px; 
            transition: font-size 0.3s; /* 加入平滑縮放效果 */
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .option-btn {
            width: 120px;
            height: 100px;
            border-radius: 30px;
            border: none;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #999;
        }

        #feedback { font-size: 32px; font-weight: bold; height: 50px; margin-bottom: 20px; }
        
        #restart-btn {
            padding: 15px 30px;
            font-size: 22px;
            background-color: #ffb6b9;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>✨ 數數小動物 ✨</h1>
    <div class="score-board">分數：<span id="score">0</span> / 100 ⭐️</div>

    <div class="game-area" id="animal-container"></div>
    <div id="feedback"></div>

    <div class="options">
        <button class="option-btn" style="background:#ffdfba" onclick="checkAnswer(1)">1</button>
        <button class="option-btn" style="background:#bae1ff" onclick="checkAnswer(2)">2</button>
        <button class="option-btn" style="background:#baffc9" onclick="checkAnswer(3)">3</button>
        <button class="option-btn" style="background:#ffb3ba" onclick="checkAnswer(4)">4</button>
    </div>

    <button id="restart-btn" onclick="resetGame()">重新開始</button>

    <script>
        let score = 0;
        let currentCount = 0;
        let isWaitingForNextRound = false; // 防止小朋友狂按按鈕
        const animals = ['🐷', '🐰', '🐤', '🐸'];

        function generateRound() {
            if (score >= 100) {
                document.getElementById('animal-container').innerHTML = '<span style="font-size:80px">👏🏻👏🏻👏🏻</span>';
                document.getElementById('feedback').innerHTML = '恭喜你獲得💯分！';
                return;
            }
            
            isWaitingForNextRound = false;
            document.getElementById('feedback').innerHTML = ''; // 清除提示文字
            const container = document.getElementById('animal-container');
            container.innerHTML = '';
            currentCount = Math.floor(Math.random() * 4) + 1;
            const randomAnimal = animals[Math.floor(Math.random() * animals.length)];

            // 當數量為 4 時，圖案縮小至 55px，否則保持 80px
            const iconSize = currentCount === 4 ? '55px' : '80px';

            for (let i = 0; i < currentCount; i++) {
                container.innerHTML += `<span class="animal-icon" style="font-size: ${iconSize}">${randomAnimal}</span>`;
            }
        }

        function checkAnswer(num) {
            if (score >= 100 || isWaitingForNextRound) return;

            const feedback = document.getElementById('feedback');
            
            if (num === currentCount) {
                // 答對了
                score += 10;
                document.getElementById('score').innerText = score;
                feedback.innerHTML = '✅ 對啦！好叻仔/女！';
                feedback.style.color = '#4caf50';
                isWaitingForNextRound = true; // 鎖定按鈕
                setTimeout(generateRound, 1200); // 1.2秒後進入下一題
            } else {
                // 答錯了，不跳下一題，鼓勵再試
                feedback.innerHTML = `❌ 差少少，不如再數多次呀？`;
                feedback.style.color = '#ff8b94';
            }
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('feedback').innerHTML = '';
            generateRound();
        }

        window.onload = generateRound;
    </script>
</body>
</html>
