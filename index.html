<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可愛動物計數遊戲</title>
    <style>
        /* 繪本風柔和背景與字體 */
        body {
            background-color: #fdf8e1; /* 柔和淺黃色 */
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #5c4a3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ff8b94;
        }

        .score-board {
            font-size: 24px;
            background-color: #ffecd2;
            padding: 10px 30px;
            border-radius: 20px;
            border: 3px dashed #ffb6b9;
            margin-bottom: 20px;
        }

        /* 動物顯示區 */
        .game-area {
            background-color: #ffffff;
            width: 90%;
            max-width: 500px;
            min-height: 200px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 30px;
            margin-bottom: 30px;
            border: 4px solid #bce6eb;
        }

        .animal {
            font-size: 70px;
            margin: 10px;
            animation: bounce 2s infinite;
        }

        /* 選項按鈕區 */
        .options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .option-btn {
            background-color: #bce6eb;
            color: #5c4a3d;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 25px;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 6px 0 #8ab8bd;
        }

        .option-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #8ab8bd;
        }

        .option-btn:nth-child(1) { background-color: #ffdfba; box-shadow: 0 6px 0 #d9bc9d; }
        .option-btn:nth-child(2) { background-color: #bae1ff; box-shadow: 0 6px 0 #9ec1d9; }
        .option-btn:nth-child(3) { background-color: #baffc9; box-shadow: 0 6px 0 #9ed9ab; }
        .option-btn:nth-child(4) { background-color: #ffb3ba; box-shadow: 0 6px 0 #d9989e; }

        /* 回饋訊息 */
        #feedback {
            font-size: 30px;
            font-weight: bold;
            height: 40px;
            margin-top: 20px;
        }

        /* 簡單跳躍動畫 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <h1>✨ 數數小動物 ✨</h1>
    
    <div class="score-board">
        分數：<span id="score">0</span> ⭐️
    </div>

    <div class="game-area" id="animal-container">
        <!-- 動物會顯示在這裡 -->
    </div>

    <div class="options">
        <button class="option-btn" onclick="checkAnswer(1)">1</button>
        <button class="option-btn" onclick="checkAnswer(2)">2</button>
        <button class="option-btn" onclick="checkAnswer(3)">3</button>
        <button class="option-btn" onclick="checkAnswer(4)">4</button>
    </div>

    <div id="feedback"></div>

    <script>
        let score = 0;
        let currentCount = 0;
        
        // 可愛的動物圖庫
        const animals = ['🐷', '🐰', '🐤', '🐸', '🐻', '🐱'];

        function generateRound() {
            const container = document.getElementById('animal-container');
            const feedback = document.getElementById('feedback');
            container.innerHTML = '';
            feedback.innerHTML = '';

            // 隨機決定數量 (1 到 4)
            currentCount = Math.floor(Math.random() * 4) + 1;
            
            // 隨機選擇一種動物
            const randomAnimal = animals[Math.floor(Math.random() * animals.length)];

            // 顯示動物
            for (let i = 0; i < currentCount; i++) {
                const span = document.createElement('span');
                span.className = 'animal';
                span.innerText = randomAnimal;
                container.appendChild(span);
            }
        }

        function checkAnswer(selectedNumber) {
            const feedback = document.getElementById('feedback');
            
            if (selectedNumber === currentCount) {
                // 答對了
                score += 10;
                document.getElementById('score').innerText = score;
                feedback.innerHTML = '✅ 好叻呀！答中咗！';
                feedback.style.color = '#4caf50';
                
                // 延遲1秒後進入下一題
                setTimeout(generateRound, 1200);
            } else {
                // 答錯了
                feedback.innerHTML = '❌ 差少少，不如數多次呀？';
                feedback.style.color = '#ff6b6b';
            }
        }

        // 遊戲開始
        window.onload = generateRound;
    </script>

</body>
</html>
