<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可愛動物計數遊戲</title>
    <style>
        body {
            background-color: #fdf8e1;
            font-family: 'Comic Sans MS', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #5c4a3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { color: #ff8b94; }

        .score-board {
            font-size: 24px;
            background-color: #ffecd2;
            padding: 10px 30px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .game-area {
            background-color: #ffffff;
            width: 90%;
            max-width: 400px;
            height: 200px;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            border: 4px solid #bce6eb;
        }

        /* 兩排式排列 */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            width: 100px;
            height: 80px;
            border-radius: 20px;
            border: none;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #999;
        }

        #feedback { font-size: 24px; font-weight: bold; height: 30px; margin-bottom: 10px; }

        #restart-btn {
            padding: 10px 25px;
            font-size: 18px;
            background-color: #ffb6b9;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            color: white;
        }
    </style>
</head>
<body>

    <h1>✨ 數數小動物 ✨</h1>
    <div class="score-board">分數：<span id="score">0</span> / 50 ⭐️</div>

    <div class="game-area" id="animal-container"></div>
    
    <div id="feedback"></div>

    <div class="options">
        <button class="option-btn" style="background:#ffdfba" onclick="checkAnswer(1)">1</button>
        <button class="option-btn" style="background:#bae1ff" onclick="checkAnswer(2)">2</button>
        <button class="option-btn" style="background:#baffc9" onclick="checkAnswer(3)">3</button>
        <button class="option-btn" style="background:#ffb3ba" onclick="checkAnswer(4)">4</button>
    </div>

    <button id="restart-btn" onclick="resetGame()">重新開始</button>

    <script>
        let score = 0;
        let currentCount = 0;
        const animals = ['🐷', '🐰', '🐤', '🐸'];

        function generateRound() {
            if (score >= 50) {
                document.getElementById('feedback').innerHTML = '👏🏻恭喜你獲得💯';
                document.getElementById('animal-container').innerHTML = '🎉';
                return;
            }
            
            const container = document.getElementById('animal-container');
            container.innerHTML = '';
            currentCount = Math.floor(Math.random() * 4) + 1;
            const randomAnimal = animals[Math.floor(Math.random() * animals.length)];

            for (let i = 0; i < currentCount; i++) {
                container.innerHTML += `<span style="font-size:50px">${randomAnimal}</span>`;
            }
        }

        function checkAnswer(num) {
            if (score >= 50) return;
            if (num === currentCount) {
                score += 10;
                document.getElementById('score').innerText = score;
                generateRound();
            } else {
                document.getElementById('feedback').innerHTML = '再試一次！';
                setTimeout(() => document.getElementById('feedback').innerHTML = '', 1000);
            }
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('feedback').innerHTML = '';
            generateRound();
        }

        window.onload = generateRound;
    </script>
</body>
</html>
