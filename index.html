<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中文字詞選擇遊戲（人物篇）</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+HK:wght@500;700&family=ZCOOL+KuaiLe&display=swap');

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Serif HK', serif;
            background-color: #fbf6ee; 
            background-image: radial-gradient(#f0e5d8 1px, transparent 0);
            background-size: 24px 24px;
            margin: 0; padding: 10px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container { width: 100%; max-width: 460px; margin: 0 auto; text-align: center; }

        h1 { font-family: 'ZCOOL KuaiLe', cursive; color: #6d4c41; font-size: 24px; margin: 5px 0 10px 0; text-shadow: 2px 2px 0px #fff; }

        /* 難度選擇區 */
        .level-selector { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
        .level-btn { flex: 1; padding: 8px 5px; font-size: 14px; font-weight: 700; border-radius: 15px; background-color: #fff9f2; color: #8d6e63; border: 2px solid #dfd3c3; box-shadow: 0 3px 0px #dfd3c3; cursor: pointer; transition: all 0.1s ease; }
        .level-btn.active { background-color: #aed6f1; color: white; border-color: #85b3d1; box-shadow: 0 3px 0px #85b3d1; transform: translateY(2px); }

        /* 資訊列 */
        #info-bar { display: flex; justify-content: space-between; align-items: center; background-color: #fff9f2; padding: 10px 15px; border-radius: 20px; margin-bottom: 15px; border: 3px dashed #dfd3c3; box-shadow: 0 4px 0px #dfd3c3; font-weight: 700; color: #5d4037; }

        /* 題目圖片顯示區 */
        #question-image-container {
            width: 100%;
            max-width: 240px;
            aspect-ratio: 1 / 1;
            margin: 0 auto 20px auto;
            background-color: #ffffff;
            border: 4px solid #fff;
            border-radius: 20px;
            box-shadow: 0 5px 0px #dfd3c3, 0 8px 12px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        #question-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        /* 4個選項排成兩排 (2x2) */
        #options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 12px;
            margin-bottom: 20px;
        }

        /* 答案按鈕樣式 */
        .option-btn {
            background-color: #ffffff;
            border: 3px solid #dfd3c3;
            border-radius: 15px;
            padding: 16px 10px;
            font-size: 22px;
            font-family: 'Noto Serif HK', serif;
            font-weight: 700;
            color: #5d4037;
            cursor: pointer;
            box-shadow: 0 5px 0px #e0e0e0;
            transition: all 0.1s ease;
            text-align: center;
        }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 1px 0px #e0e0e0; }
        
        /* 答對與答錯的顏色變化 */
        .option-btn.correct { background-color: #abebd0; border-color: #81c784; color: #1b5e20; box-shadow: 0 5px 0px #81c784; }
        .option-btn.wrong { background-color: #ffcdd2; border-color: #e57373; color: #b71c1c; box-shadow: 0 5px 0px #e57373; }

        /* 重新開始按鈕 */
        .restart-btn { width: 100%; padding: 14px; font-family: 'Noto Serif HK', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; border: none; border-radius: 25px; background-color: #ffb37e; color: white; box-shadow: 0 5px 0px #e0925c; }
        .restart-btn:active { transform: translateY(4px); box-shadow: none; }

        /* 答錯搖晃動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .option-btn.shake { animation: shake 0.4s ease-in-out; }

        /* 彈出視窗 (Modal) 樣式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(109, 76, 65, 0.6);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #fff9f2; padding: 40px 30px; border-radius: 20px;
            text-align: center; border: 4px dashed #dfd3c3;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: scale(0.8); transition: transform 0.3s ease;
            width: 90%; max-width: 320px;
        }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .modal-content h2 { font-family: 'Noto Serif HK', serif; color: #d87073; font-size: 28px; margin: 0 0 25px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 中文字詞選擇遊戲（人物篇） ✨</h1>
        
        <div class="level-selector">
            <button class="level-btn active" onclick="changeLevel(6, this)">🌱 簡單 (6題)</button>
            <button class="level-btn" onclick="changeLevel(8, this)">🌲 普通 (8題)</button>
            <button class="level-btn" onclick="changeLevel(10, this)">🌋 困難 (10題)</button>
        </div>

        <div id="info-bar">
            <div>✏️ 第 <span id="current-q-num">1</span> / <span id="total-q-num">6</span> 題</div>
            <div>⏱️ 時間: <span id="timer">0</span> 秒</div>
        </div>

        <div id="game-area">
            <div id="question-image-container">
                <img id="question-image" src="" alt="題目">
            </div>
            
            <div id="options-grid">
                </div>
        </div>

        <button class="restart-btn" onclick="initGame()">🔄 重新開始玩</button>

        <div id="success-modal" class="modal-overlay">
            <div class="modal-content">
                <h2>👏🏻恭喜你獲得💯</h2>
                <button class="restart-btn" onclick="initGame()">🔄 再玩一次</button>
            </div>
        </div>
    </div>

    <script>
        const fullGameData = [
            { word: '朋友', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhpL6ExStn7guf96fZAWMqCPvR5p3iZuoMEXjtWCxE6hAEv2jWu26YuglUr_giXiuis2uPZMK4rwx_xzNWrrsMDMK5xaoutOPRcBjb8-krPEJ1CQEU7g-_xRwezvQ20lufpmUsScZpkadY/s800/friends_man.png' },
            { word: '外婆', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEizq8z9NXOVhHLZvbyZDdhS89-6sLmnDgfktg6sb7fMJ-D6lYp1_YcsYIwonDgZDdBFeYvceh31c7pejqfwVWNQpgl007ZSqdVVOvbeJAqeLnXDVucqVHlyjdoTbq1gNkYbmbvxrEdMR5c/s800/obaasan.png' },
            { word: '老師', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhm_E-H-K-_FgN2faRN8GBGyLGYlBRd7ableXu-UkGQQHSUai1QJpssQsdbjG_JgTOsqL0HB5IuINGRf4jtaT5PmprKYOt0fWzFi6THUTi2-JfCDFdHbtnSCRRiWwrlrcTBq-1MMPVzedw/s800/kid_job_girl_teacher.png' },
            { word: '護士', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi0Xif0qqyS8Xu38KMrotkfwCIJlmgjJR5AG9h81a7ZLd9k6qJRgNht3JRXuS7WZwvrCH113634NAm-VUT51gm3C96ieLUcQ_jcds5tkPTOKRhLJ3KStuAKECoi9DscMW8r6TDNwKTlxCs/s800/nurse03_smile.png' },
            { word: '學生', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhZD_0oZPdff5EXGhJq7npkiQcgRSOqhfJBAt1MwKX_T05RwhTiTTBjF4Z2cDbvd3hyoneBFlxFlMPrOv02XOPkkgDNzeyX9HfYanXuNH3hmbk2QZldkl6dfcUDMypva7y2d_BkWy1HtyOm/s1600/school_randoseru_boy.png' },
            { word: '姊妹', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiYQxf5gU-yDJHxgjCS9IywQutKOSOS6mevosbgL2eTTb1rnXO7PBcBdDEjVqKJHLGJWHxkYmY0EVIqUlGAmMjHUqAG3BfpodKtUGO7J_xgcd3g5pJwRxW9Y0PgB_9eO0_hvKBO2rhiXP4/s800/family_shimai.png' },
            { word: '父母', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhVSMnv707L90ziM6KIJkVkmtuBo8qjYfCDDgV1rs_u1pmgRzCR-MH6RUN8umsdoQmS96ne4ekES5M48mqBXCx82NIFQmsWSs39tsgXve1zS-phTYFjpvxlrH_YoTkJMCMFmYOXml8Q1UrC/s800/family_fusen_boy.png' },
            { word: '司機', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjiHI59-eQIPditx8jvP8zMMyFJoaoPEAHVpKYcmfQTDZS2Nr-wL3ac4JnBkJ1rtj02rexEzolZnWsD8Ap1ybLS4OYdYPB3WNsjjWPHIQiiNmOwiF2diE8eG_pkhYRM5QCG9y43CxQ3028/s800/taxi_driver_untensyu3.png' },
            { word: '警察', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgbDxoBV3A5o2YXx4DuYfr5yYaYrB2JqdaIFQRZ8JxXk7jZ4kjxYw00gnHulrXABfVk3BOWcwAmuW3Safx1-tyRl_lcejQ-2VN-KPuZqIZZ8gc5lOGbQW7L_uotROIa4OZjV-rAwBb3xrjM/s800/police_shirt_man1_young.png' },
            { word: '女孩', image: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiuRI1GFywg8s9GfBJVwKECn1Slo9qHBZOAPis1Cu2brt9L78XV9ch-__pl5Y8zP_OQL5E7g3T1WPI4gKR6h-cdPV6lx-c6hBbuEgw3wWxX9YbNqUtCPUxp6Ew2P7pG8DCy75l_QyCsoKY/s800/girl_23.png' }
        ];

        let currentTotalQuestions = 6;
        let questionsList = [];
        let currentQuestionIndex = 0;
        let lockBoard = false;
        let timerInterval, secondsElapsed = 0;

        function changeLevel(num, btn) {
            currentTotalQuestions = num;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initGame();
        }

        function startTimer() {
            clearInterval(timerInterval);
            secondsElapsed = 0;
            document.getElementById('timer').textContent = secondsElapsed;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                document.getElementById('timer').textContent = secondsElapsed;
            }, 1000);
        }

        function initGame() {
            // 隱藏彈出視窗並解鎖畫面
            document.getElementById('success-modal').classList.remove('show');
            lockBoard = false;
            
            // 設定題數並打亂題目
            document.getElementById('total-q-num').textContent = currentTotalQuestions;
            questionsList = [...fullGameData].sort(() => 0.5 - Math.random()).slice(0, currentTotalQuestions);
            currentQuestionIndex = 0;
            
            startTimer();
            loadQuestion();
        }

        function loadQuestion() {
            // 檢查是否已達最後一題
            if (currentQuestionIndex >= questionsList.length) {
                clearInterval(timerInterval);
                document.getElementById('success-modal').classList.add('show');
                return;
            }

            document.getElementById('current-q-num').textContent = currentQuestionIndex + 1;
            
            let currentQ = questionsList[currentQuestionIndex];
            document.getElementById('question-image').src = currentQ.image;

            // 準備四個選項（1個正確，3個隨機錯誤選項）
            let options = [currentQ.word];
            let wrongOptions = fullGameData.filter(item => item.word !== currentQ.word).sort(() => 0.5 - Math.random());
            options.push(wrongOptions[0].word, wrongOptions[1].word, wrongOptions[2].word);
            
            // 打亂四個選項的順序
            options.sort(() => 0.5 - Math.random());

            let grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            // 建立按鈕並加上 1, 2, 3, 4 序號
            options.forEach((opt, index) => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${index + 1}. ${opt}`;
                btn.onclick = () => checkAnswer(opt, btn, currentQ.word);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selectedWord, btn, correctWord) {
            if (lockBoard) return; // 動畫播放期間禁止點擊
            lockBoard = true;
            
            if (selectedWord === correctWord) {
                // 答對處理
                btn.classList.add('correct');
                setTimeout(() => {
                    currentQuestionIndex++;
                    lockBoard = false;
                    loadQuestion();
                }, 600); // 延遲0.6秒進入下一題，讓學生看清楚綠色答對狀態
            } else {
                // 答錯處理
                btn.classList.add('wrong', 'shake');
                setTimeout(() => {
                    btn.classList.remove('wrong', 'shake');
                    lockBoard = false;
                }, 800); // 延遲0.8秒後恢復，讓學生可以重新選擇
            }
        }

        // 頁面載入時立刻啟動遊戲
        initGame();
    </script>
</body>
</html>
